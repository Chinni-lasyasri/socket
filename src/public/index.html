<!DOCTYPE html>
<html>
<head>
<title>Websocket Testing</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>

<body>

<div id="loginPage">

<h2>Login</h2>

<form id="loginForm">
<input id="usernameInput" placeholder="Enter Username" required/>
<button type="submit">Join</button>
</form>

</div>

<div id="chatPage">

<div id="messages">
  <div id="roomHeader">Room 1</div>
</div>

<form id="chatForm">
<input id="messageInput" placeholder="Message..." required/>
<button type="submit">Send</button>
</form>

</div>

<script>

const socket = io("https://socket-ojt5.onrender.com", {
  transports: ["websocket"]
});

const loginPage = document.getElementById("loginPage");
const chatPage = document.getElementById("chatPage");

const loginForm = document.getElementById("loginForm");
const usernameInput = document.getElementById("usernameInput");

const chatForm = document.getElementById("chatForm");
const messageInput = document.getElementById("messageInput");

const messages = document.getElementById("messages");

let username = "";

// function addMessage(data){
//   const div=document.createElement("div");
//   div.classList.add("msg");

//   if(data.username === username){
//     div.classList.add("right");
//   }else{
//     div.classList.add("left");
//   }

//   div.innerHTML=`${data.message}`;
//   messages.appendChild(div);

//   messages.scrollTop = messages.scrollHeight;
// }

function addMessage(data){
  const div = document.createElement("div");
  div.classList.add("msg");

  if(data.username === username){
    div.classList.add("right");
  }else{
    div.classList.add("left");
  }

  div.innerHTML = `${data.message}`;

  messages.appendChild(div);

  messages.scrollTop = messages.scrollHeight;
}

loginForm.addEventListener("submit",(e)=>{
  e.preventDefault();

  username = usernameInput.value;

  const allowedUsers = ["1001","2002", "3003"];

  if(!allowedUsers.includes(username)){
    alert("User does not exist");
    return;
  }

  loginPage.style.display="none";
  chatPage.style.display="flex";
  messages.innerHTML = "";


  socket.emit("join-room",{
    room:"room1",
    username:username
  });

});

socket.on("previous-messages",(msgs)=>{
  msgs.forEach(addMessage);
});

chatForm.addEventListener("submit",(e)=>{
  e.preventDefault();

  const message = messageInput.value.trim();
  if(!message) return;

  socket.emit("room-message",{
    room:"Personal Chat",
    username:username,
    message:message
  });

  messageInput.value="";
});

socket.on("message",(data)=>{
  addMessage(data);
});

</script>

</body>
</html>
